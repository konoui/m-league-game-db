name: Validate SQL Queries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download latest database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --pattern 'database.zip'
          unzip database.zip

      - name: Run query validation
        run: ./scripts/query-helper.sh run-all database.sqlite3 query-examples
